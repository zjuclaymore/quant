# 多因子回测配置文件

# 回测核心参数
backtest:
  test_name: "dividend_strategy_12y"
  start_date: "20100101"
  end_date: "20221231"
  benchmark: "000300.SH"  # 沪深300
  commission: 0.0015
  delay_days: 0

# 因子配置
factors:
  # 因子列表: [因子组, 因子名称]
  list:
    - ["factor_package", "dividend_yield_processed_parquet"]
    - ["factor_package", "announcement_gap_processed_parquet"]
    - ["factor_package", "tr_adjust_umr_1_processed_parquet"]
  
  # 因子聚合方法列表 (批量跑多种聚合方法)
  aggregation_methods:
    - "equal_weight"

  # IC加权参数
  ic_weighted_params:
    lookback: 12
    half_life: 6

# 微盘股过滤 (因子已预处理，仅保留市值过滤)
micro_cap_filter:
  exclude_micro_cap: true
  micro_cap_percentile: 0.20

# 组合构建
portfolio:
  rebalance_freq: "monthly"
  group_num: 5
  group_size: 50           # 每组选50只
  # 权重方法列表 (批量跑多种优化方法)
  weight_methods:
    - "dividend_yield_processed_parquet_weight"
    - "equal"
    - "cvx_enhanced"
    - "mvo"
  industry_neutral: false
  max_industry_weight: 0.3
  max_single_weight: 0.1   # 个股最大权重10%

# 股票池过滤参数
stock_filter:
  min_days_since_ipo: 60
  min_valid_days_20: 15
  liquidity_percentile: 0.10
  max_delay_days: 20

# 输出配置
output:
  base_dir: "E:\\1_basement\\quant_research\\back_test\\multi_factor_test\\output"
  save_trade_details: true
  save_daily_portfolio: true
  generate_html_report: true
  export_eval_pickle: true
